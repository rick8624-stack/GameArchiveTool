# CD：推送 v* 标签（如 v1.1.0）时自动打包单文件 exe 并发布 GitHub Release。
# 也可在 Actions 页面手动触发（workflow_dispatch）验证打包，手动触发只上传
# 构建产物（artifact），不发 Release。
#
# 发布流程：
#   git tag v1.1.0
#   git push origin v1.1.0
name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  PYTHONIOENCODING: utf-8

permissions:
  contents: write   # 创建 Release 需要写权限

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装打包依赖
        run: pip install pyinstaller tkinterdnd2

      - name: 发布前跑一遍测试
        run: python -m unittest discover -s tests -v

      - name: pyinstaller 打包（带拖拽支持）
        run: >
          python -m pyinstaller --onefile --windowed --name GameArchiveTool
          --collect-all tkinterdnd2 main.py

      - name: 打包产物冒烟检查（exe 存在且非空）
        shell: pwsh
        run: |
          $exe = "dist/GameArchiveTool.exe"
          if (-not (Test-Path $exe)) { throw "打包产物不存在" }
          if ((Get-Item $exe).Length -lt 1MB) { throw "exe 异常偏小，疑似打包失败" }
          Get-Item $exe | Select-Object Name, Length

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: GameArchiveTool-${{ github.ref_name }}
          path: dist/GameArchiveTool.exe

      - name: 创建 GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/GameArchiveTool.exe
          generate_release_notes: true
