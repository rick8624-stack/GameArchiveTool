# CI：每次 push 到 main 或提 PR 时，在 Windows 运行器上做语法检查 + 测试。
# windows-latest 运行器预装 7-Zip，解压流程测试可以真实执行；
# 未预装 tkinterdnd2 时 GUI 自动降级，正好覆盖"无拖拽依赖"的运行路径。
name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  PYTHONIOENCODING: utf-8   # 保证中文日志/文件名在运行器控制台不报编码错误

jobs:
  test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.10 是 README 承诺的最低版本，3.12 代表当前主流版本
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: 语法检查（全部模块可编译）
        run: python -m compileall -q main.py gui.py utils.py core tests

      - name: 运行测试
        run: python -m unittest discover -s tests -v
